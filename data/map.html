<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crimes par quartier — Cambridge, MA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f4f3ee; color: #1a1a1a; }
  #header { padding: 18px 24px 14px; background: #fff;
             border-bottom: 1px solid #e0ddd4; }
  #header h1 { font-size: 17px; font-weight: 500; }
  #header p  { font-size: 13px; color: #666; margin-top: 3px; }
  #map { height: calc(100vh - 68px); width: 100%; }

  .legend { background: #fff; padding: 14px 16px; border-radius: 8px;
             border: 0.5px solid #ddd; font-size: 12px; line-height: 1.6;
             box-shadow: 0 1px 4px rgba(0,0,0,.08); min-width: 140px; }
  .legend h4 { font-size: 12px; font-weight: 500; margin-bottom: 8px;
                color: #333; }
  .legend-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 2px;
                    flex-shrink: 0; border: 0.5px solid rgba(0,0,0,.1); }

  .tooltip-box { font-family: inherit; }
  .tooltip-box .name { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
  .tooltip-box .count { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .tooltip-box .unit { font-size: 11px; color: #888; }
  .tooltip-box .pct  { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
<div id="header">
  <h1>Répartition des crimes par quartier — Cambridge, MA</h1>
  <p>Source : crime_reports_clean.csv · Agrégation par Neighborhood</p>
</div>
<div id="map"></div>

<script>
const GEOJSON   = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"NAME": "East Cambridge", "OBJECTID": 1, "crime_count": 1128}, "geometry": {"type": "Polygon", "coordinates": [[[-71.104, 42.374], [-71.086, 42.374], [-71.086, 42.362], [-71.104, 42.362], [-71.104, 42.374]]]}}, {"type": "Feature", "properties": {"NAME": "MIT", "OBJECTID": 2, "crime_count": 184}, "geometry": {"type": "Polygon", "coordinates": [[[-71.104, 42.362], [-71.086, 42.362], [-71.086, 42.354], [-71.104, 42.354], [-71.104, 42.362]]]}}, {"type": "Feature", "properties": {"NAME": "Riverside", "OBJECTID": 3, "crime_count": 877}, "geometry": {"type": "Polygon", "coordinates": [[[-71.12, 42.362], [-71.104, 42.362], [-71.104, 42.354], [-71.12, 42.354], [-71.12, 42.362]]]}}, {"type": "Feature", "properties": {"NAME": "Cambridgeport", "OBJECTID": 4, "crime_count": 1323}, "geometry": {"type": "Polygon", "coordinates": [[[-71.12, 42.372], [-71.104, 42.372], [-71.104, 42.362], [-71.12, 42.362], [-71.12, 42.372]]]}}, {"type": "Feature", "properties": {"NAME": "Mid-Cambridge", "OBJECTID": 5, "crime_count": 907}, "geometry": {"type": "Polygon", "coordinates": [[[-71.12, 42.382], [-71.104, 42.382], [-71.104, 42.372], [-71.12, 42.372], [-71.12, 42.382]]]}}, {"type": "Feature", "properties": {"NAME": "Inman/Harrington", "OBJECTID": 6, "crime_count": 544}, "geometry": {"type": "Polygon", "coordinates": [[[-71.104, 42.382], [-71.086, 42.382], [-71.086, 42.374], [-71.104, 42.374], [-71.104, 42.382]]]}}, {"type": "Feature", "properties": {"NAME": "Area 4", "OBJECTID": 7, "crime_count": 877}, "geometry": {"type": "Polygon", "coordinates": [[[-71.104, 42.374], [-71.086, 42.374], [-71.086, 42.364], [-71.104, 42.364], [-71.104, 42.374]]]}}, {"type": "Feature", "properties": {"NAME": "North Cambridge", "OBJECTID": 8, "crime_count": 892}, "geometry": {"type": "Polygon", "coordinates": [[[-71.12, 42.396], [-71.098, 42.396], [-71.098, 42.382], [-71.12, 42.382], [-71.12, 42.396]]]}}, {"type": "Feature", "properties": {"NAME": "Agassiz", "OBJECTID": 9, "crime_count": 232}, "geometry": {"type": "Polygon", "coordinates": [[[-71.098, 42.396], [-71.082, 42.396], [-71.082, 42.382], [-71.098, 42.382], [-71.098, 42.396]]]}}, {"type": "Feature", "properties": {"NAME": "West Cambridge", "OBJECTID": 10, "crime_count": 847}, "geometry": {"type": "Polygon", "coordinates": [[[-71.14, 42.382], [-71.12, 42.382], [-71.12, 42.362], [-71.14, 42.362], [-71.14, 42.382]]]}}, {"type": "Feature", "properties": {"NAME": "Peabody", "OBJECTID": 11, "crime_count": 573}, "geometry": {"type": "Polygon", "coordinates": [[[-71.14, 42.396], [-71.12, 42.396], [-71.12, 42.382], [-71.14, 42.382], [-71.14, 42.396]]]}}, {"type": "Feature", "properties": {"NAME": "Highlands", "OBJECTID": 12, "crime_count": 230}, "geometry": {"type": "Polygon", "coordinates": [[[-71.082, 42.382], [-71.064, 42.382], [-71.064, 42.368], [-71.082, 42.368], [-71.082, 42.382]]]}}, {"type": "Feature", "properties": {"NAME": "Strawberry Hill", "OBJECTID": 13, "crime_count": 128}, "geometry": {"type": "Polygon", "coordinates": [[[-71.082, 42.396], [-71.064, 42.396], [-71.064, 42.382], [-71.082, 42.382], [-71.082, 42.396]]]}}]};
const NAME_COL  = "NAME";
const MIN_VAL   = 128;
const MAX_VAL   = 1323;
const TOTAL     = GEOJSON.features.reduce((s,f)=>s+f.properties.crime_count,0);

const map = L.map('map').setView([42.377, -71.108], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

function lerp(a, b, t) {
  return { r: Math.round(a.r+(b.r-a.r)*t), g: Math.round(a.g+(b.g-a.g)*t), b: Math.round(a.b+(b.b-a.b)*t) };
}

function getColor(v) {
  const t = MAX_VAL > MIN_VAL ? (v - MIN_VAL)/(MAX_VAL - MIN_VAL) : 0;
  const green = {r:80, g:185, b:110};
  const yellow= {r:253,g:210, b: 80};
  const red   = {r:215,g: 50, b: 50};
  const c = t < 0.5 ? lerp(green,yellow,t*2) : lerp(yellow,red,(t-.5)*2);
  return `rgb(${c.r},${c.g},${c.b})`;
}

function style(feature) {
  return {
    fillColor  : getColor(feature.properties.crime_count),
    weight     : 1.5,
    color      : 'rgba(255,255,255,0.85)',
    fillOpacity: 0.82,
  };
}

let hovered = null;

function onEachFeature(feature, layer) {
  layer.on({
    mouseover(e) {
      const l = e.target;
      l.setStyle({ weight:2.5, color:'#333', fillOpacity:0.95 });
      l.bringToFront();
      hovered = l;
      const p = feature.properties;
      const pct = ((p.crime_count/TOTAL)*100).toFixed(1);
      layer.bindTooltip(`
        <div class="tooltip-box">
          <div class="name">${p[NAME_COL]}</div>
          <div class="count">${p.crime_count.toLocaleString('fr-FR')}</div>
          <div class="unit">crimes signalés</div>
          <div class="pct">${pct}% du total</div>
        </div>`, {sticky:true, className:'tooltip-box'}).openTooltip(e.latlng);
    },
    mouseout(e) {
      geo.resetStyle(e.target);
      layer.closeTooltip();
    },
  });
}

const geo = L.geoJSON(GEOJSON, { style, onEachFeature }).addTo(map);
map.fitBounds(geo.getBounds(), {padding:[16,16]});

// Légende
const legend = L.control({position:'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h4>Nombre de crimes</h4>';
  const steps = 5;
  for (let i=steps; i>=0; i--) {
    const v = Math.round(MIN_VAL+(MAX_VAL-MIN_VAL)*(i/steps));
    div.innerHTML += `<div class="legend-row">
      <span class="legend-swatch" style="background:${getColor(v)}"></span>
      <span>${v.toLocaleString('fr-FR')}</span>
    </div>`;
  }
  div.innerHTML += `<div style="margin-top:10px;padding-top:8px;border-top:0.5px solid #e0ddd4;font-size:11px;color:#888;">
    Total : ${TOTAL.toLocaleString('fr-FR')} crimes<br>(quartier renseigné)</div>`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
